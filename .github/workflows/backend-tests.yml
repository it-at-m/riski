name: Backend Tests

on:
  pull_request:
    paths:
      - "riski-backend/**"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: riski_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d riski_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: riski-backend
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version-file: "riski-backend/.python-version"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run backend tests
        run: uv run pytest
    env:
      OPENAI_API_KEY: dummykey
      RISKI_BACKEND__CORE__DB__HOSTNAME: localhost
      RISKI_BACKEND__CORE__DB__PORT: "5432"
      RISKI_BACKEND__CORE__DB__NAME: riski_test
      RISKI_BACKEND__CORE__DB__USER: postgres
      RISKI_BACKEND__CORE__DB__PASSWORD: postgres
      RISKI_TEST_DB_ASYNC_URL: postgresql+psycopg://postgres:postgres@localhost:5432/riski_test
