name: MCP Tests

on:
  pull_request:
    paths:
      - "riski-mcp/**"
      - ".github/workflows/mcp-tests.yml"

permissions:
  contents: read

jobs:
  mcp-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: riski-mcp
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version-file: "riski-mcp/.python-version"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Type check (ty)
        run: uv run ty check src app.py

      - name: Tests
        run: uv run pytest

      - name: requirements.txt is in sync with the lockfile
        # Must match the pre-commit hook (uv-export-riski-mcp-requirements) exactly,
        # including the `--directory` flag that ends up in the file's header comment.
        working-directory: ${{ github.workspace }}
        run: |
          uv export --directory riski-mcp --no-dev --no-emit-project --no-hashes -o requirements.txt
          git diff --exit-code riski-mcp/requirements.txt
